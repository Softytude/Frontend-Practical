<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropbox Business Landing</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="left">
            <button class="basic-btn">Get Dropbox Basic</button>
        </div>

        <div class="center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Dropbox_Logo_01.svg/1920px-Dropbox_Logo_01.svg.png" alt="logo">
        </div>

        <div class="right">
            <a href="#">Compare plans</a>
            <a href="#">Sign in</a>
        </div>
    </nav>

    <section class="hero">
        <div class="overlay"></div>

        <div class="content">
            <h1>Work better, safer,<br>together.</h1>

            <p>
                Dropbox Business simplifies your work, with a central place to access and share files.
            </p>

            <div class="buttons">
                <button class="main-btn">Try Dropbox Business free</button>
                <button class="basic-btn outline">Get Dropbox Basic</button>
            </div>

            <p class="note">
                Try Dropbox Business free for 30 days. No credit card needed.
            </p>
        </div>
    </section>

</body>
</html>
